<!DOCTYPE html>
<html>
<head>
    <title>ATM Machine</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        .atm-box {
            border: 2px solid black;
            padding: 20px;
            width: 320px;
            margin: auto;
        }
        input {
            padding: 8px;
            width: 80%;
            margin: 10px 0;
        }
        button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }
        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="atm-box">
    <h2>ATM Machine</h2>
    <p><strong>Balance: ₹<span id="balance">8000</span></strong></p>

    <input type="number" id="amount" placeholder="Enter amount">
    <br>

    <button onclick="withdrawMoney()">Withdraw</button>
    <button onclick="depositMoney()">Deposit</button>

    <p id="message"></p>
</div>

<script>

let balance = 8000;

function withdrawMoney() {
    let amount = parseInt(document.getElementById("amount").value);
    let message = document.getElementById("message");

    if (amount <= 0 || isNaN(amount)) {
        message.innerText = "Invalid Amount";
    }
    else if (amount > balance) {
        message.innerText = "Insufficient Balance";
    }
    else if (amount % 100 !== 0) {
        message.innerText = "Amount should be multiple of 100";
    }
    else {
        balance = balance - amount;
        document.getElementById("balance").innerText = balance;
        message.innerText = "Withdrawal Successful";
    }
}

function depositMoney() {
    let amount = parseInt(document.getElementById("amount").value);
    let message = document.getElementById("message");

    if (amount <= 0 || isNaN(amount)) {
        message.innerText = "Invalid Deposit Amount";
    }
    else {
        balance = balance + amount;
        document.getElementById("balance").innerText = balance;
        message.innerText = "Deposit Successful";
    }
}

</script>

</body>
</html>
