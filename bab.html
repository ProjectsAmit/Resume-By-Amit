<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <section id="main" class="hero">
        <h1 id="head">Hello World!</h1>
        <p id="para">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam facilis nostrum vel voluptatibus assumenda ducimus cumque laborum inventore, magnam quis.</p>
        <img id="img" src="https://jbsoftware.ca/wp-content/uploads/web-design.jpg" alt="">
        <div class="btn-1">
            <div>
            <button onclick="console()">Change</button>
        </div>
        <div>
            <button onclick="window.print()" class="btn">Print</button>
        </div>
        </div>
    </section>


    <script>
        function console(){
            document.getElementById('head').innerHTML= 'Success!';
            document.getElementById('head').style.color = 'black';
            document.getElementById('para').style.color = 'red';
            document.getElementById('img').src = "https://thirdessential.com/wp-content/uploads/2022/02/Website-Development-Designing.png";
            document.getElementById('main').style.background = 'white';
            document.getElementById('main').style.border = '5px solid black';
        }
    </script>
</body>
</html>
